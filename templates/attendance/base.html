<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}FaceTrack{% endblock %}</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  {% block extra_head %}{% endblock %}
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #050d1a;
      --sidebar: #080f1e;
      --panel: #0b1628;
      --card: #0f1e35;
      --border: rgba(56, 139, 253, 0.14);
      --blue: #388bfd;
      --blue-glow: rgba(56, 139, 253, 0.25);
      --cyan: #00d4ff;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --text: #e6edf3;
      --muted: #7d8fa9;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --sidebar-w: 250px;
    }


    select.form-input option {
      background-color: #1e293b;
      color: #ffffff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 100;
    }

    .sidebar-logo {
      padding: 24px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 800;
    }

    .logo-text span {
      color: var(--blue);
    }

    .sidebar-nav {
      flex: 1;
      padding: 16px 12px;
      overflow-y: auto;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 8px 10px 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 9px;
      cursor: pointer;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      margin-bottom: 2px;
      position: relative;
    }

    .nav-item:hover {
      background: rgba(56, 139, 253, 0.08);
      color: var(--text);
    }

    .nav-item.active {
      background: rgba(56, 139, 253, 0.12);
      color: var(--blue);
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 20%;
      bottom: 20%;
      width: 3px;
      background: var(--blue);
      border-radius: 0 2px 2px 0;
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border);
    }

    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar-title {
      font-family: var(--font-head);
      font-size: 16px;
      font-weight: 700;
    }

    .content {
      padding: 28px;
      flex: 1;
    }

    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: var(--blue);
      color: #fff;
    }

    .btn-primary:hover {
      background: #2a7ae0;
      box-shadow: 0 4px 16px var(--blue-glow);
    }

    .btn-outline {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-outline:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    .btn-danger {
      background: rgba(248, 81, 73, 0.15);
      color: var(--red);
      border: 1px solid rgba(248, 81, 73, 0.2);
    }

    .btn-danger:hover {
      background: rgba(248, 81, 73, 0.25);
    }

    .btn-success {
      background: rgba(63, 185, 80, 0.15);
      color: var(--green);
      border: 1px solid rgba(63, 185, 80, 0.2);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: var(--font-head);
      font-size: 28px;
      font-weight: 800;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      padding: 12px 16px;
      text-align: left;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--muted);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid rgba(56, 139, 253, 0.06);
      transition: background 0.2s;
    }

    tbody tr:hover {
      background: rgba(56, 139, 253, 0.04);
    }

    tbody td {
      padding: 12px 16px;
      font-size: 14px;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-present {
      background: rgba(63, 185, 80, 0.12);
      color: var(--green);
      border: 1px solid rgba(63, 185, 80, 0.2);
    }

    .badge-late {
      background: rgba(210, 153, 34, 0.12);
      color: var(--yellow);
      border: 1px solid rgba(210, 153, 34, 0.2);
    }

    .badge-absent {
      background: rgba(248, 81, 73, 0.12);
      color: var(--red);
      border: 1px solid rgba(248, 81, 73, 0.2);
    }

    .badge-dept {
      background: rgba(56, 139, 253, 0.12);
      color: var(--blue);
      border: 1px solid var(--border);
    }

    .form-input {
      width: 100%;
      background: rgba(56, 139, 253, 0.04);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      font-family: var(--font-body);
      font-size: 14px;
      border-radius: 8px;
      outline: none;
      transition: all 0.2s;
    }

    .form-input:focus {
      border-color: var(--blue);
      background: rgba(56, 139, 253, 0.08);
      box-shadow: 0 0 20px rgba(56, 139, 253, 0.1);
    }

    .form-input::placeholder {
      color: var(--muted);
    }

    .form-label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    select.form-input {
      appearance: none;
      cursor: pointer;
    }

    .alert {
      padding: 12px 20px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .alert-success {
      background: rgba(63, 185, 80, 0.12);
      color: var(--green);
      border: 1px solid rgba(63, 185, 80, 0.2);
    }

    .alert-error {
      background: rgba(248, 81, 73, 0.12);
      color: var(--red);
      border: 1px solid rgba(248, 81, 73, 0.2);
    }

    .alert-warning {
      background: rgba(210, 153, 34, 0.12);
      color: var(--yellow);
      border: 1px solid rgba(210, 153, 34, 0.2);
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #fff;
      flex-shrink: 0;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }

      .main {
        margin-left: 0;
      }

      .grid-4,
      .grid-3,
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }
  </style>
  {% block extra_styles %}{% endblock %}
</head>

<body>
  {% block body %}{% endblock %}
</body>

</html>
